<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lama Zana Voucher</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="voucher-wrapper" id="voucher">
        <div class="header-info">
            <img src="logo.png" alt="Logo" class="shop-logo" crossorigin="anonymous">
            <p class="shop-tagline">Born A Queen</p>
        </div>

        <div class="info-row">
            <div class="phone-box">
                <span class="label">Phone:</span>
                <input type="text" class="line-input" value="09457055106">
            </div>
            <div class="date-box">
                <span class="label">Date:</span>
                <input type="text" id="autoDate" class="line-input" value="March 18, 2026" readonly>
            </div>
        </div>

        <table class="voucher-table">
            <thead>
                <tr>
                    <th style="width: 10%;">No</th>
                    <th style="width: 45%;">Item</th>
                    <th style="width: 10%;">Qty</th>
                    <th style="width: 15%;">Price</th>
                    <th style="width: 20%;">Amount</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>1</td>
                    <td><input type="text"></td>
                    <td><input type="number" class="qty" oninput="calculateTotal()"></td>
                    <td><input type="number" class="price" oninput="calculateTotal()"></td>
                    <td><input type="number" class="amount" readonly></td>
                </tr>
                <tr>
                    <td>2</td>
                    <td><input type="text"></td>
                    <td><input type="number" class="qty" oninput="calculateTotal()"></td>
                    <td><input type="number" class="price" oninput="calculateTotal()"></td>
                    <td><input type="number" class="amount" readonly></td>
                </tr>
                <tr>
                    <td>3</td>
                    <td><input type="text"></td>
                    <td><input type="number" class="qty" oninput="calculateTotal()"></td>
                    <td><input type="number" class="price" oninput="calculateTotal()"></td>
                    <td><input type="number" class="amount" readonly></td>
                </tr>
                <tr>
                    <td>4</td>
                    <td><input type="text"></td>
                    <td><input type="number" class="qty" oninput="calculateTotal()"></td>
                    <td><input type="number" class="price" oninput="calculateTotal()"></td>
                    <td><input type="number" class="amount" readonly></td>
                </tr>
                <tr>
                    <td>5</td>
                    <td><input type="text"></td>
                    <td><input type="number" class="qty" oninput="calculateTotal()"></td>
                    <td><input type="number" class="price" oninput="calculateTotal()"></td>
                    <td><input type="number" class="amount" readonly></td>
                </tr>
                <tr>
                    <td>6</td>
                    <td><input type="text"></td>
                    <td><input type="number" class="qty" oninput="calculateTotal()"></td>
                    <td><input type="number" class="price" oninput="calculateTotal()"></td>
                    <td><input type="number" class="amount" readonly></td>
                </tr>
                <tr>
                    <td>7</td>
                    <td><input type="text"></td>
                    <td><input type="number" class="qty" oninput="calculateTotal()"></td>
                    <td><input type="number" class="price" oninput="calculateTotal()"></td>
                    <td><input type="number" class="amount" readonly></td>
                </tr>

                <tr class="total-row">
                    <td colspan="4" style="text-align: center; color: white; font-weight: bold;">Total</td>
                    <td><input type="number" class="amount-total" value="0" readonly></td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="print-btn-container">
        <button onclick="downloadVoucher()">Download Image</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
